<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:    #050810;
      --bg2:     #0d1117;
      --bg3:     #161b22;
      --border:  #21262d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --blue:    #58a6ff;
      --purple:  #bc8cff;
      --ease:    0.3s cubic-bezier(0.4, 0, 0.2, 1);
      /* warm palette */
      --warm:    #c4c0b8;
      --card-bg: #ebe7e0;
      --orange:  #e0711a;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); overflow-x: hidden; cursor: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ═══ NAVBAR ═══ */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      padding: 22px 0; transition: all var(--ease);
    }
    .navbar.scrolled {
      background: rgba(5,8,16,0.88); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); padding: 14px 0;
    }
    .navbar-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 18px; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.5px; }
    .logo em { color: var(--blue); font-style: normal; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color var(--ease); }
    .nav-links a:hover { color: var(--text); }

    /* ═══ HERO ═══ */
    /* old #hero overridden by new hero CSS below */

    #hero-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .hero-ui { position: relative; z-index: 10; text-align: center; max-width: 680px; padding: 0 24px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(88,166,255,.1); border: 1px solid rgba(88,166,255,.25);
      border-radius: 100px; padding: 5px 16px;
      font-size: 12px; font-weight: 600; letter-spacing: .5px;
      color: var(--blue); margin-bottom: 20px; animation: fadeUp .8s .2s both;
    }
    .badge-dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.5)} }
    .hero-role { font-size: clamp(13px,1.8vw,17px); font-weight: 600; color: var(--purple); margin-bottom: 14px; letter-spacing: 1px; animation: fadeUp .8s .4s both; }
    .hero-desc  { font-size: 15px; color: var(--muted); line-height: 1.85; margin-bottom: 32px; animation: fadeUp .8s .6s both; }
    .hero-btns  { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; animation: fadeUp .8s .8s both; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 26px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; transition: all var(--ease); font-family: 'Inter', sans-serif; }
    .btn-primary { background: var(--blue); color: #050810; }
    .btn-primary:hover { filter: brightness(1.15); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(88,166,255,.3); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-2px); }

    .scroll-hint { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 8px; color: rgba(139,148,158,.6); font-size: 9px; font-weight: 700; letter-spacing: 3px; animation: fadeUp 1s 2s both; }
    .scroll-mouse { width: 20px; height: 32px; border: 1.5px solid rgba(139,148,158,.4); border-radius: 10px; position: relative; }
    .scroll-mouse::after { content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 3px; height: 7px; background: rgba(139,148,158,.5); border-radius: 2px; animation: scrollDot 1.6s infinite ease-in-out; }
    @keyframes scrollDot { 0%{opacity:1;top:6px} 100%{opacity:0;top:16px} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* ═══════════════════════════════════════════════════
       WORKS  —  full-width warm gray, scroll-driven cards
    ═══════════════════════════════════════════════════ */
    #works-sec {
      position: relative;
      /* height set by JS: N × 80vh + 20vh */
    }

    /* Sticky viewport */
    .wk-sticky {
      position: sticky;
      top: 0;
      height: 100svh;
      overflow: hidden;
      background: #080a0f;
    }
    /* gold dot grid overlay */
    .wk-sticky::before {
      content: '';
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(240,201,110,0.18) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Huge faded counter (background layer) ── */
    .wk-bg-ctr {
      position: absolute;
      top: 42%;
      left: 28%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: baseline;
      gap: 0.12em;
      font-size: clamp(120px, 18vw, 210px);
      font-weight: 900;
      letter-spacing: -0.07em;
      color: rgba(240,201,110,0.07);
      pointer-events: none;
      user-select: none;
      z-index: 1;
      white-space: nowrap;
      line-height: 0.85;
      transition: opacity 0.4s;
    }
    .wk-bg-dash { font-size: 0.6em; font-weight: 200; letter-spacing: 0; margin: 0 0.05em; }

    /* ── Card canvas (full width behind UI) ── */
    .wk-canvas {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    /* ── Card wrapper (absolute within canvas) ── */
    .wk-card-wrap {
      position: absolute;
      /* transition applied inline for perf */
    }

    /* ── Card visual ── */
    .wk-card {
      width: 228px;
      background: #0f1218;
      border-radius: 11px;
      border: 1px solid rgba(240,201,110,0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 14px 22px 52px rgba(0,0,0,0.32), 3px 5px 14px rgba(0,0,0,0.18);
    }
    .card-top   { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 12px 6px; flex-shrink: 0; }
    .card-num   { display: flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 800; color: var(--gold-bright); letter-spacing: .5px; }
    .card-ctag  { font-size: 9px; font-weight: 700; color: var(--gold-bright); letter-spacing: .8px; border: 1px solid rgba(240,201,110,0.4); padding: 2px 6px; border-radius: 3px; background: rgba(240,201,110,0.08); }
    .card-img   { flex: 1; min-height: 140px; display: flex; align-items: center; justify-content: center; font-size: 46px; margin: 0 10px; border-radius: 7px; background: #161b22; }
    .card-bot   { padding: 8px 12px 11px; flex-shrink: 0; }
    .card-title { font-style: italic; font-weight: 900; font-size: 15px; color: #e8e0d0; letter-spacing: -.4px; margin-bottom: 4px; }
    .card-tags  { font-size: 8px; color: rgba(240,201,110,0.5); letter-spacing: .6px; margin-bottom: 6px; }
    .card-bc    { width: 100%; height: 24px; overflow: hidden; }

    /* ── Top bar (above cards) ── */
    .wk-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 26px 36px 0;
      z-index: 20;
      pointer-events: none;
    }
    .wk-sec-label { font-size: 12px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(240,201,110,0.5); }
    .wk-sec-cat   { font-size: 12px; font-weight: 600; color: rgba(240,201,110,0.35); }

    /* ── Right side: minimal project list (NO dark bg) ── */
    .wk-side {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 38%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 44px 80px 20px;
      z-index: 20;
    }
    .wk-side-title {
      font-size: 10px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(240,201,110,0.4);
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(240,201,110,0.15);
    }
    .wk-list { list-style: none; }
    .wk-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(240,201,110,0.12);
      cursor: pointer;
      transition: all 0.2s;
      pointer-events: all;
    }
    .wk-item-l { display: flex; align-items: center; gap: 9px; }
    .wk-item-icon {
      font-size: 10px; color: rgba(240,201,110,0.9);
      opacity: 0; width: 13px; flex-shrink: 0;
      transition: opacity .2s;
    }
    .wk-item.active .wk-item-icon { opacity: 1; }
    .wk-item-name {
      font-size: 14px; font-weight: 500;
      color: rgba(232,224,208,0.35);
      transition: all .2s;
    }
    .wk-item.active .wk-item-name,
    .wk-item:hover  .wk-item-name {
      color: #e8e0d0; font-weight: 700;
    }
    .wk-item-tags { font-size: 10px; color: rgba(240,201,110,0.3); text-align: right; line-height: 1.4; }
    .wk-item-dot  { width: 5px; height: 5px; border-radius: 50%; background: rgba(240,201,110,0.25); flex-shrink: 0; }
    .wk-item.active .wk-item-dot  { background: var(--gold-bright); }
    .wk-item:hover  .wk-item-dot  { background: rgba(240,201,110,0.7); }

    /* ── Bottom bar (active project info + dot progress) ── */
    .wk-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 40%;
      padding: 22px 36px 26px;
      z-index: 20;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .wk-act-name {
      font-size: clamp(20px, 2.8vw, 34px);
      font-weight: 900; font-style: italic;
      color: #e8e0d0;
      letter-spacing: -0.8px;
      transition: opacity .22s, transform .22s;
    }
    .wk-act-tags {
      font-size: 11px; color: rgba(240,201,110,0.45);
      margin-top: 4px; letter-spacing: .4px;
    }
    /* Dot progress */
    .wk-dots {
      display: flex; gap: 7px; align-items: center;
      padding-bottom: 4px;
    }
    .wk-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(240,201,110,0.2);
      cursor: pointer; pointer-events: all;
      transition: all .3s;
    }
    .wk-dot.lit { background: var(--gold-bright); transform: scale(1.45); }

    /* ═══ FOOTER ═══ */
    footer { background: var(--dark); border-top: 1px solid var(--border); padding: 28px; text-align: center; color: var(--muted); font-size: 12px; }

    /* ═══ SCROLL REVEAL ═══ */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity .65s var(--ease), transform .65s var(--ease); }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 900px) {
      .wk-side { width: 46%; padding: 60px 24px 60px 12px; }
      .wk-bottom { right: 48%; }
    }
    @media (max-width: 768px) {
      .about-grid { grid-template-columns: 1fr; }
      .about-avatar { max-width: 180px; margin: 0 auto; font-size: 56px; }
      .nav-links { display: none; }
      .wk-side { display: none; }
      .wk-bottom { right: 0; }
      .wk-bg-ctr { left: 50%; }
    }

    /* ═══ DETAIL PANEL ═══ */
    #detail-panel {
      position: fixed; inset: 0; z-index: 500;
      display: flex; align-items: stretch;
      pointer-events: none; opacity: 0;
      transition: opacity 0.45s cubic-bezier(0.16,1,0.3,1);
    }
    #detail-panel.open { opacity: 1; pointer-events: all; }

    .dp-backdrop {
      position: absolute; inset: 0;
      background: rgba(5,8,16,0.55);
      backdrop-filter: blur(6px);
    }

    .dp-sheet {
      position: relative; z-index: 1;
      margin: auto;
      width: min(92vw, 780px);
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 18px;
      overflow: hidden;
      transform: translateY(40px) scale(0.97);
      transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
      display: flex; flex-direction: column;
    }
    #detail-panel.open .dp-sheet { transform: translateY(0) scale(1); }

    .dp-hero {
      height: 240px;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px; position: relative; overflow: hidden;
    }
    .dp-hero-num {
      position: absolute; bottom: 16px; left: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
    }
    .dp-close {
      position: absolute; top: 16px; right: 16px;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #e6edf3; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .dp-close:hover { background: rgba(255,255,255,0.16); }

    .dp-body { padding: 28px 32px 32px; }
    .dp-tags { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .dp-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--blue);
      border: 1px solid rgba(88,166,255,0.3);
      padding: 3px 10px; border-radius: 100px;
    }
    .dp-title {
      font-size: clamp(28px,5vw,42px); font-weight: 900;
      font-style: italic; letter-spacing: -1px;
      color: var(--text); margin-bottom: 6px;
    }
    .dp-year {
      font-size: 11px; color: var(--muted); letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 20px;
    }
    .dp-desc {
      font-size: 15px; line-height: 1.9; color: var(--muted);
      margin-bottom: 28px; border-left: 2px solid var(--border);
      padding-left: 16px;
    }
    .dp-items {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .dp-item {
      font-size: 12px; font-weight: 600;
      background: #161b22; border: 1px solid #21262d;
      color: var(--text); padding: 7px 14px; border-radius: 8px;
      letter-spacing: 0.3px;
    }
    .dp-nav {
      display: flex; justify-content: space-between;
      padding: 18px 32px; border-top: 1px solid var(--border);
    }
    .dp-nav-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-weight: 600;
      padding: 8px 18px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s; font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }
    .dp-nav-btn:hover { border-color: var(--blue); color: var(--blue); }
    .dp-nav-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }


    /* ═══ DETAIL GALLERY ═══ */

    /* スクロール可能パネル */
    .dp-sheet {
      max-height: 92vh !important;
      display: flex !important;
      flex-direction: column !important;
      overflow: hidden !important;
      width: min(96vw, 860px) !important;
    }
    .dp-body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .dp-body::-webkit-scrollbar { width: 4px; }
    .dp-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Gallery: 全タイプ共通1カラム ── */
    .dp-gallery { margin-top: 32px; }
    .dp-gallery-label {
      font-size: 10px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .dg-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .dg-item {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      cursor: zoom-in;
    }
    .dg-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    .dg-item:hover img { transform: scale(1.02); }
    .dg-caption {
      padding: 10px 2px 4px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    /* ── Lightbox ── */
    #dp-lightbox {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,0.94);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #dp-lightbox.open { opacity: 1; pointer-events: all; }
    #dp-lightbox img {
      max-width: 90vw; max-height: 90vh;
      border-radius: 10px;
      object-fit: contain;
    }
    #dp-lightbox-close {
      position: absolute; top: 20px; right: 24px;
      color: rgba(255,255,255,0.7); font-size: 28px;
      cursor: pointer; background: none; border: none;
      transition: color 0.2s;
    }
    #dp-lightbox-close:hover { color: #fff; }



    /* ═══ HERO (New Gold Theme) ═══ */
    :root {
      --gold-bright: #f0c96e;
      --gold-mid:    #c8952a;
      --gold-dark:   #7a5010;
      --hero-bg:     #080a0f;
      --text-dim:    rgba(232,224,208,0.35);
      --line:        rgba(240,201,110,0.12);
    }
    #cursor {
      position:fixed; width:6px; height:6px;
      background:var(--gold-bright); border-radius:50%;
      pointer-events:none; z-index:9999;
      transform:translate(-50%,-50%);
      transition:transform 0.08s,width 0.2s,height 0.2s,opacity 0.2s;
      mix-blend-mode:difference;
    }
    #cursor-ring {
      position:fixed; width:32px; height:32px;
      border:1px solid rgba(240,201,110,0.5); border-radius:50%;
      pointer-events:none; z-index:9998;
      transform:translate(-50%,-50%);
      transition:transform 0.18s ease-out,width 0.25s,height 0.25s,opacity 0.25s;
    }
    /* Hero section */
    #hero {
      position:relative; width:100vw; height:100svh; min-height:640px;
      overflow:hidden; display:flex; flex-direction:row; align-items:center;
      justify-content:flex-start; padding-bottom:0;
      background: var(--hero-bg);
    }
    #bg-canvas { position:absolute; inset:0; width:100%; height:100%; z-index:0; }
    #hero::after {
      content:''; position:absolute; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size:256px; opacity:0.55; pointer-events:none; z-index:3;
    }
    #horse-canvas {
      position:absolute; left:60%; top:50%;
      transform:translate(-50%,-50%);
      width:72vw; max-width:960px; height:82vh; z-index:2;
      opacity:0; animation:fadeHorse 1.8s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }
    @keyframes fadeHorse {
      from{opacity:0;transform:translate(-50%,-46%);}
      to  {opacity:1;transform:translate(-50%,-50%);}
    }
    .hero-text {
      position:relative; z-index:4; padding:0 0 0 7vw; max-width:52vw;
    }
    .eyebrow {
      font-family:'DM Mono',monospace; font-size:clamp(9px,0.8vw,11px);
      font-weight:300; letter-spacing:0.42em; color:var(--gold-bright);
      text-transform:uppercase; margin-bottom:28px;
      opacity:0; animation:slideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      display:flex; align-items:center; gap:16px;
    }
    .eyebrow::before {
      content:''; display:inline-block; width:32px; height:1px;
      background:var(--gold-bright); opacity:0.6;
    }
    #hero h1 {
      font-family:'Cormorant Garamond',serif; font-weight:300;
      font-size:clamp(52px,6.5vw,104px); line-height:0.92;
      letter-spacing:-0.02em; color:#e8e0d0; margin-bottom:32px;
      opacity:0; animation:slideUp 1s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
    }
    #hero h1 em { font-style:italic; color:var(--gold-bright); display:block; }
    .hero-subtitle {
      font-family:'DM Mono',monospace; font-size:clamp(11px,0.85vw,13px);

/* ══════════════════════════════════════════════════
   Card slot positions & fly-in origins
══════════════════════════════════════════════════ */
// top / left in %, rotation in deg
const SLOTS = [
  { t:  8, l:  2, r: -13 },
  { t: 32, l: 20, r:   9 },
  { t:  4, l: 38, r: -21 },
  { t: 50, l:  5, r:  16 },
  { t: 22, l: 46, r:  -7 },
  { t: 56, l: 27, r:  22 },
];
const FLY = [
  'translate(-110vw,-5vh)',
  'translate(-6vw,118vh)',
  'translate(88vw,-118vh)',
  'translate(-102vw,44vh)',
  'translate(118vw,-12vh)',
  'translate(8vw,118vh)',
];

/* ══════════════════════════════════════════════════
   Barcode SVG generator
══════════════════════════════════════════════════ */
function barcode(seed, w, h) {
  let n = 0;
  for (let i = 0; i < seed.length; i++) n = (Math.imul(31,n) + seed.charCodeAt(i)) | 0;
  const rng = () => { n = (Math.imul(1664525,n) + 1013904223)|0; return (n>>>0)/0xffffffff; };
  let svg = '', x = 0;
  while (x < w) {
    const bw = Math.ceil(rng()*3)+1, gap = Math.ceil(rng()*3)+1;
    svg += `<rect x="${x}" y="0" width="${bw}" height="${h}" fill="#2a2a2a"/>`;
    x += bw + gap;
  }
  return `<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
}

/* ══════════════════════════════════════════════════
   DOM injection
══════════════════════════════════════════════════ */
function injectContent() {
  document.title = `${MY.name} — Portfolio`;
  const footerEl = document.getElementById('footer-copy');
  if(footerEl) footerEl.textContent = `© ${new Date().getFullYear()} ${MY.name} ✦`;
}

/* ══════════════════════════════════════════════════
   WORKS — scroll-driven card accumulation
══════════════════════════════════════════════════ */
let wkActive = 0;

function buildCardEl(work, idx) {
  const num  = String(idx+1).padStart(2,'0');
  const tag  = work.tags[0].toUpperCase();
  const tags = work.tags.map(t=>`[${t.toUpperCase()}]`).join(' ');
  const bc   = barcode(work.title, 204, 24);
  const imgContent = work.image
    ? `<img src="${work.image}" alt="${work.title}" style="width:100%;height:100%;object-fit:cover;display:block;" />`
    : `<span style="font-size:46px">${work.emoji}</span>`;
  const div  = document.createElement('div');
  div.className = 'wk-card';
  div.innerHTML = `
    <div class="card-top">
      <div class="card-num">▲ ${num}</div>
      <div class="card-ctag">[${tag}]</div>
    </div>
    <div class="card-img" style="background:${work.bg}">${imgContent}</div>
    <div class="card-bot">
      <div class="card-title">${work.title}</div>
      <div class="card-tags">${tags}</div>
      <div class="card-bc">${bc}</div>
    </div>`;
  return div;
}

function showCard(i, isNewest) {
  const wrap = document.getElementById(`ww${i}`);
  if (!wrap) return;
  const s = SLOTS[i];
  wrap.style.opacity   = isNewest ? '1' : '0.72';
  wrap.style.transform = `translate(${s.l}%, ${s.t}%) rotate(${s.r}deg)`;
  wrap.style.zIndex    = isNewest ? '15' : String(4 + i);
  wrap.style.filter    = isNewest ? 'none' : 'brightness(0.9)';
}

function hideCard(i) {
  const wrap = document.getElementById(`ww${i}`);
  if (!wrap) return;
  const s = SLOTS[i];
  wrap.style.opacity   = '0';
  wrap.style.transform = `${FLY[i]} rotate(${s.r}deg)`;
  wrap.style.zIndex    = String(4 + i);
  wrap.style.filter    = 'none';
}

function setActive(idx) {
  wkActive = idx;
  const work = MY.works[idx];
  const n = String(idx+1).padStart(2,'0');

  // Background counter
  document.getElementById('wk-bg-cur').textContent = n;

  // Top category
  document.getElementById('wk-top-cat').textContent = (work.tags[0] || 'Design') + '.';

  // Bottom info — animate out → in
  const nameEl = document.getElementById('wk-act-name');
  const tagsEl = document.getElementById('wk-act-tags');
  nameEl.style.opacity = '0'; nameEl.style.transform = 'translateY(8px)';
  setTimeout(() => {
    nameEl.textContent = work.title;
    tagsEl.textContent = work.tags.map(t => `// ${t}`).join(' ');
    nameEl.style.opacity = ''; nameEl.style.transform = '';
  }, 200);

  // List highlight
  document.querySelectorAll('.wk-item').forEach((li, i) => li.classList.toggle('active', i === idx));

  // Dots
  document.querySelectorAll('.wk-dot').forEach((d, i) => d.classList.toggle('lit', i === idx));
}

function applyDisplay(target) {
  const N = MY.works.length;
  target = Math.max(0, Math.min(N-1, target));
  for (let i = 0; i < N; i++) {
    if (i <= target) showCard(i, i === target);
    else             hideCard(i);
  }
  setActive(target);
}

function scrollToWork(idx) {
  const sec = document.getElementById('works-sec');
  const top = sec.getBoundingClientRect().top + window.scrollY;
  window.scrollTo({ top: top + idx * window.innerHeight * 0.8, behavior: 'smooth' });
}

function initWorks() {
  const N   = MY.works.length;
  const sec = document.getElementById('works-sec');
  sec.style.height = `${N * 80 + 20}vh`;

  document.getElementById('wk-bg-tot').textContent = String(N).padStart(2,'0');

  // Build card wrappers (all hidden initially)
  const canvas = document.getElementById('wk-canvas');
  MY.works.forEach((work, i) => {
    const s    = SLOTS[i];
    const wrap = document.createElement('div');
    wrap.className = 'wk-card-wrap';
    wrap.id        = `ww${i}`;
    // Start in fly-in position (hidden)
    wrap.style.cssText = `
      top: 0; left: 0;
      opacity: 0;
      transform: ${FLY[i]} rotate(${s.r}deg);
      z-index: ${4+i};
      transition: transform 0.88s cubic-bezier(0.16,1,0.3,1), opacity 0.55s ease, filter 0.3s;
    `;
    const cardEl = buildCardEl(work, i);
    cardEl.style.cursor = 'pointer';
    cardEl.addEventListener('click', () => openDetail(i));
    wrap.appendChild(cardEl);
    canvas.appendChild(wrap);
  });

  // Build project list
  const list = document.getElementById('wk-list');
  MY.works.forEach((work, i) => {
    const li   = document.createElement('li');
    li.className = 'wk-item' + (i === 0 ? ' active' : '');
    const tagsStr = work.tags.map(t => `// ${t}`).join(' ');
    li.innerHTML = `
      <div class="wk-item-l">
        <span class="wk-item-icon">✦</span>
        <span class="wk-item-name">${work.title}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="wk-item-tags">${tagsStr}</span>
        <div class="wk-item-dot"></div>
      </div>`;
    li.addEventListener('click', () => openDetail(i));
    li.addEventListener('mouseenter', () => applyDisplay(i));   // preview on hover
    li.addEventListener('mouseleave', () => applyDisplay(wkActive)); // restore
    list.appendChild(li);
  });

  // Build dot progress indicators
  const dotsEl = document.getElementById('wk-dots');
  MY.works.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'wk-dot' + (i === 0 ? ' lit' : '');
    d.addEventListener('click', () => openDetail(i));
    dotsEl.appendChild(d);
  });

  // Set initial bottom info
  document.getElementById('wk-act-name').textContent = MY.works[0].title;
  document.getElementById('wk-act-tags').textContent = MY.works[0].tags.map(t => `// ${t}`).join(' ');
  document.getElementById('wk-top-cat').textContent  = (MY.works[0].tags[0] || 'Design') + '.';
  document.getElementById('wk-act-name').style.transition = 'opacity .22s, transform .22s';

  // Trigger first card when Works enters view
  const io = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) { applyDisplay(0); io.disconnect(); }
  }, { threshold: 0.05 });
  io.observe(sec);

  // Scroll handler
  let last = -1;
  window.addEventListener('scroll', () => {
    const rect = sec.getBoundingClientRect();
    if (rect.top > window.innerHeight * 0.2 || rect.bottom < 0) return;
    const scrolledIn = Math.max(0, -rect.top);
    const perCard    = window.innerHeight * 0.8;
    const cur        = Math.min(Math.floor(scrolledIn / perCard), N - 1);
    if (cur !== last) { applyDisplay(cur); last = cur; }
  }, { passive: true });
}

/* ══════════════════════════════════════════════════
   BG CANVAS (gradient + dot grid)
══════════════════════════════════════════════════ */
(function bgAnim(){
  const c=document.getElementById('bg-canvas');
  if(!c) return;
  const ctx=c.getContext('2d');
  let W,H,t=0;
  function resize(){W=c.width=c.offsetWidth;H=c.height=c.offsetHeight;}
  resize(); window.addEventListener('resize',resize);
  function draw(){
    requestAnimationFrame(draw); t+=0.004;
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#080a0f'); bg.addColorStop(1,'#0b0e16');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    const ox=W*(0.55+Math.sin(t*0.7)*0.08), oy=H*(0.45+Math.cos(t*0.5)*0.06);
    const orb=ctx.createRadialGradient(ox,oy,0,ox,oy,W*0.38);
    orb.addColorStop(0,'rgba(180,120,30,0.09)'); orb.addColorStop(0.5,'rgba(100,70,10,0.04)'); orb.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=orb; ctx.fillRect(0,0,W,H);
    const cx2=W*(0.15+Math.cos(t*0.6)*0.05), cy2=H*(0.55+Math.sin(t*0.8)*0.07);
    const orb2=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,W*0.22);
    orb2.addColorStop(0,'rgba(40,60,100,0.07)'); orb2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=orb2; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.globalAlpha=0.07;
    const gsp=60;
    for(let x=gsp/2;x<W;x+=gsp) for(let y=gsp/2;y<H;y+=gsp){
      ctx.beginPath(); ctx.arc(x,y,0.8,0,Math.PI*2);
      ctx.fillStyle='#f0c96e'; ctx.fill();
    }
    ctx.restore();
  }
  draw();
})();

/* ══════════════════════════════════════════════════
   HORSE CANVAS (low-poly gold animated)
══════════════════════════════════════════════════ */
(function horseAnim(){
  const c=document.getElementById('horse-canvas');
  if(!c) return;
  const ctx=c.getContext('2d');
  const VERTS_BASE={
    nose:[0.830,0.190],chin:[0.845,0.235],cheek:[0.800,0.270],eye:[0.770,0.220],forehead:[0.755,0.175],
    ear_base:[0.740,0.155],ear_tip:[0.735,0.105],
    neck_top1:[0.710,0.180],neck_top2:[0.675,0.220],neck_bot1:[0.650,0.290],neck_bot2:[0.640,0.340],
    mane1:[0.700,0.200],mane2:[0.670,0.245],mane3:[0.650,0.300],
    wither:[0.620,0.320],back1:[0.540,0.295],back2:[0.450,0.305],back3:[0.360,0.320],rump:[0.270,0.355],
    chest:[0.620,0.400],belly1:[0.540,0.430],belly2:[0.450,0.440],belly3:[0.360,0.440],belly4:[0.270,0.435],
    haunch_t:[0.220,0.365],haunch_m:[0.195,0.410],haunch_b:[0.215,0.450],
    tail1:[0.175,0.355],tail2:[0.120,0.330],tail3:[0.075,0.360],tail4:[0.065,0.410],tail5:[0.090,0.455],tail6:[0.140,0.470],tail7:[0.165,0.480],
    fr_knee:[0.660,0.465],fr_shin:[0.690,0.545],fr_fetlock:[0.680,0.610],fr_hoof:[0.665,0.645],
    fl_knee:[0.560,0.470],fl_shin:[0.545,0.570],fl_fetlock:[0.525,0.650],fl_hoof:[0.510,0.690],
    hr_hip:[0.255,0.450],hr_knee:[0.215,0.545],hr_shin:[0.195,0.625],hr_fetlock:[0.185,0.690],hr_hoof:[0.175,0.720],
    hl_hip:[0.310,0.450],hl_knee:[0.320,0.540],hl_shin:[0.305,0.630],hl_fetlock:[0.290,0.700],hl_hoof:[0.280,0.732],
  };
  const FACES=[
    ['nose','chin','cheek'],['nose','cheek','eye'],['nose','eye','forehead'],['eye','forehead','ear_base'],['forehead','ear_base','ear_tip'],
    ['eye','neck_top1','forehead'],['eye','cheek','neck_top1'],['cheek','neck_top1','neck_top2'],['neck_top1','neck_top2','neck_bot1'],['neck_top2','neck_bot1','neck_bot2'],['neck_bot1','neck_bot2','wither'],
    ['neck_top1','mane1','mane2'],['neck_top1','neck_bot1','mane2'],['mane2','mane3','neck_bot1'],
    ['wither','back1','chest'],['wither','back1','back2'],['back1','back2','belly1'],['back1','chest','belly1'],['back2','back3','belly2'],['back2','belly1','belly2'],['back3','rump','belly3'],['back3','belly2','belly3'],['rump','haunch_t','belly4'],['rump','belly3','belly4'],['haunch_t','haunch_m','belly4'],['haunch_m','haunch_b','belly4'],
    ['haunch_t','haunch_m','hr_hip'],['haunch_m','haunch_b','hr_hip'],['belly4','haunch_b','hl_hip'],['haunch_b','hr_hip','hl_hip'],
    ['haunch_t','tail1','tail2'],['tail1','tail2','tail3'],['tail2','tail3','tail4'],['tail3','tail4','tail5'],['tail4','tail5','tail6'],['tail5','tail6','tail7'],
    ['chest','fr_knee','belly1'],['chest','fr_knee','fr_shin'],['fr_knee','fr_shin','fr_fetlock'],['fr_shin','fr_fetlock','fr_hoof'],
    ['belly1','fl_knee','belly2'],['belly1','fl_knee','fl_shin'],['fl_knee','fl_shin','fl_fetlock'],['fl_shin','fl_fetlock','fl_hoof'],
    ['hr_hip','hr_knee','haunch_b'],['hr_hip','hr_knee','hr_shin'],['hr_knee','hr_shin','hr_fetlock'],['hr_shin','hr_fetlock','hr_hoof'],
    ['hl_hip','hl_knee','belly4'],['hl_hip','hl_knee','hl_shin'],['hl_knee','hl_shin','hl_fetlock'],['hl_shin','hl_fetlock','hl_hoof'],
    ['neck_bot2','wither','chest'],
  ];
  const FACE_L={0:68,1:72,2:78,3:65,4:58,5:75,6:70,7:68,8:72,9:66,10:74,11:45,12:42,13:48,14:76,15:72,16:68,17:74,18:66,19:70,20:72,21:68,22:74,23:70,24:66,25:62,26:70,27:68,28:64,29:66,30:68,31:65,32:72,33:66,34:52,35:48,36:44,37:42,38:46,39:50,40:48,41:78,42:72,43:66,44:60,45:74,46:68,47:62,48:56,49:70,50:64,51:58,52:52,53:72,54:66,55:60,56:54,57:76};
  let W,H,t=0,breathAnim=0;
  function resize(){
    W=c.width=c.offsetWidth*window.devicePixelRatio;
    H=c.height=c.offsetHeight*window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  }
  resize(); window.addEventListener('resize',()=>{ctx.resetTransform();resize();});
  const cW=()=>c.offsetWidth, cH=()=>c.offsetHeight;
  function getVerts(breath,gallop){
    const v={};
    for(const[name,[nx,ny]]of Object.entries(VERTS_BASE)) v[name]=[nx*cW(),ny*cH()];
    const b=Math.sin(breath)*0.008;
    ['belly1','belly2','belly3','belly4','chest'].forEach(n=>{if(v[n])v[n][1]+=b*cH();});
    const g=gallop,g2=gallop+Math.PI;
    const legSwing=(name,dx,dy)=>{if(v[name]){v[name][0]+=dx*cW();v[name][1]+=dy*cH();}};
    const s1=Math.sin(g)*0.025,s2=Math.sin(g2)*0.022;
    legSwing('fr_knee',s1*0.4,-Math.abs(s1)*0.6);legSwing('fr_shin',s1*0.6,-Math.abs(s1)*0.4);
    legSwing('fr_fetlock',s1*0.7,-Math.abs(s1)*0.2);legSwing('fr_hoof',s1*0.8,Math.sin(g)*0.018*0.3);
    legSwing('fl_knee',s2*0.3,s2*0.3);legSwing('fl_shin',s2*0.5,s2*0.5);legSwing('fl_fetlock',s2*0.6,s2*0.6);legSwing('fl_hoof',s2*0.7,s2*0.7);
    legSwing('hr_knee',-s1*0.3,s1*0.4);legSwing('hr_shin',-s1*0.5,s1*0.6);legSwing('hr_fetlock',-s1*0.6,s1*0.7);legSwing('hr_hoof',-s1*0.7,s1*0.8);

    const bounce=Math.abs(Math.sin(g))*0.005;
    for(const n in v) v[n][1]-=bounce*cH();
    return v;
  }
  function goldColor(idx,verts,face){
    const baseL=FACE_L[idx]??65;
    const[a,b,fd]=face,va=verts[a],vb=verts[b],vc=verts[fd];
    if(!va||!vb||!vc) return `hsl(38,75%,${baseL}%)`;
    const cy=(va[1]+vb[1]+vc[1])/3/cH();
    return `hsl(${36+Math.sin(idx)*4},${74+Math.cos(idx*2)*12}%,${Math.max(30,baseL-cy*15)}%)`;
  }
  function draw(){
    requestAnimationFrame(draw); t+=0.018; breathAnim+=0.022;
    const verts=getVerts(breathAnim,t);
    ctx.save(); ctx.clearRect(0,0,cW(),cH());
    const glow=ctx.createRadialGradient(cW()*0.48,cH()*0.44,0,cW()*0.48,cH()*0.44,cW()*0.42);
    glow.addColorStop(0,'rgba(200,140,30,0.10)');glow.addColorStop(0.6,'rgba(160,100,20,0.04)');glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.fillRect(0,0,cW(),cH());
    FACES.forEach((face,idx)=>{
      const[an,bn,cn]=face,va=verts[an],vb=verts[bn],vc=verts[cn];
      if(!va||!vb||!vc) return;
      ctx.beginPath(); ctx.moveTo(va[0],va[1]); ctx.lineTo(vb[0],vb[1]); ctx.lineTo(vc[0],vc[1]); ctx.closePath();
      ctx.fillStyle=goldColor(idx,verts,face); ctx.fill();
      ctx.strokeStyle=`hsla(42,80%,${Math.min(90,(FACE_L[idx]??65)+12)}%,0.55)`; ctx.lineWidth=0.7; ctx.stroke();
    });
    [1,2,14,17,41].forEach(idx=>{
      if(!FACES[idx]) return;
      const[an,bn,cn]=FACES[idx],va=verts[an],vb=verts[bn],vc=verts[cn];
      if(!va||!vb||!vc) return;
      const hcx=(va[0]+vb[0]+vc[0])/3,hcy=(va[1]+vb[1]+vc[1])/3;
      const hg=ctx.createRadialGradient(hcx,hcy,0,hcx,hcy,30);
      hg.addColorStop(0,'rgba(255,235,160,0.22)');hg.addColorStop(1,'rgba(255,220,100,0)');
      ctx.beginPath(); ctx.moveTo(va[0],va[1]); ctx.lineTo(vb[0],vb[1]); ctx.lineTo(vc[0],vc[1]); ctx.closePath();
      ctx.fillStyle=hg; ctx.fill();
    });
    ctx.restore();
  }
  draw();
})();

<script>
/* ═══ DETAIL PANEL ═══ */
(function() {
  let current = 0;
  const panel   = document.getElementById('detail-panel');
  const backdrop = document.getElementById('dp-backdrop');
  const hero    = document.getElementById('dp-hero');
  const emoji   = document.getElementById('dp-emoji');
  const heroNum = document.getElementById('dp-hero-num');
  const tags    = document.getElementById('dp-tags');
  const title   = document.getElementById('dp-title');
  const year    = document.getElementById('dp-year');
  const desc    = document.getElementById('dp-desc');
  const items   = document.getElementById('dp-items');
  const prevBtn = document.getElementById('dp-prev');
  const nextBtn = document.getElementById('dp-next');

  function openDetail(idx) {
    current = idx;
    const w = MY.works[idx];
    const d = w.detail;
    const n = String(idx+1).padStart(2,'0');
    const tot = String(MY.works.length).padStart(2,'0');

    hero.style.background = w.bg;
    emoji.textContent     = w.emoji;
    heroNum.textContent   = n + ' / ' + tot;
    title.textContent     = w.title;
    year.textContent      = d.year;
    desc.textContent      = d.desc;

    tags.innerHTML = w.tags.map(t =>
      '<span class="dp-tag">' + t + '</span>'
    ).join('');

    items.innerHTML = d.items.map(it =>
      '<div class="dp-item">' + it + '</div>'
    ).join('');

    const galleryEl = document.getElementById('dp-gallery');
    galleryEl.innerHTML =
      '<div class="dp-gallery-label">Gallery</div>' +
      '<div class="dg-grid">' +
      d.gallery.map(function(img) {
        return '<div class="dg-item" data-src="' + img.src + '">' +
          '<img src="' + img.src + '" alt="' + (img.caption||'') + '" loading="lazy" />' +
          (img.caption ? '<div class="dg-caption">' + img.caption + '</div>' : '') +
          '</div>';
      }).join('') +
      '</div>';

    galleryEl.querySelectorAll('.dg-item').forEach(function(item) {
      item.addEventListener('click', function() { openLightbox(item.dataset.src); });
    });

    document.querySelector('.dp-body').scrollTop = 0;
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === MY.works.length - 1;
    panel.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDetail() {
    panel.classList.remove('open');
    document.body.style.overflow = '';
  }

  window.openDetail = openDetail;

  backdrop.addEventListener('click', closeDetail);
  document.getElementById('dp-close').addEventListener('click', closeDetail);
  prevBtn.addEventListener('click', function() { openDetail(current - 1); });
  nextBtn.addEventListener('click', function() { openDetail(current + 1); });
  document.addEventListener('keydown', function(e) {
    if (!panel.classList.contains('open')) return;
    if (e.key === 'Escape') closeDetail();
    if (e.key === 'ArrowLeft'  && current > 0) openDetail(current - 1);
    if (e.key === 'ArrowRight' && current < MY.works.length - 1) openDetail(current + 1);
  });

  function openLightbox(src) {
    const lb  = document.getElementById('dp-lightbox');
    const img = document.getElementById('dp-lightbox-img');
    img.src = src;
    lb.classList.add('open');
  }
  document.getElementById('dp-lightbox-close').addEventListener('click', function() {
    document.getElementById('dp-lightbox').classList.remove('open');
  });
  document.getElementById('dp-lightbox').addEventListener('click', function(e) {
    if (e.target.id === 'dp-lightbox') document.getElementById('dp-lightbox').classList.remove('open');
  });
})();
</script>
